name: "Attest"

on:
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Attest
        uses: actions/attest@v4
        with:
          subject-path: '${{ github.workspace }}/recovery-lock-rotation.sh'
